# Local Iceberg end-to-end environment for iceberg-optimizer testing.
#
# Run `docker compose up -d` then `docker exec -it spark-iceberg bash` to get a
# Spark shell. All Iceberg SQL examples from references/procedures.md work against
# the `demo` catalog, which is wired to the REST catalog and MinIO below.
#
# The tests/ and scripts/ directories are bind-mounted at /opt/tests and
# /opt/scripts inside the Spark container for easy access.

services:

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/warehouse &&
        echo 'Bucket warehouse created.'
      "
    restart: "no"

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_ACCESS__KEY__ID: minioadmin
      CATALOG_S3_SECRET__ACCESS__KEY: minioadmin
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_REGION: us-east-1

  spark-iceberg:
    image: tabulario/spark-iceberg:latest
    container_name: spark-iceberg
    depends_on:
      iceberg-rest:
        condition: service_started
    ports:
      - "8888:8888"   # Jupyter (if available)
      - "4040:4040"   # Spark UI
    environment:
      # Point the Spark session at the REST catalog and MinIO
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      # Spark / Iceberg catalog config via env (picked up by spark-defaults.conf template)
      SPARK_CONF_spark.sql.catalog.demo: org.apache.iceberg.spark.SparkCatalog
      SPARK_CONF_spark.sql.catalog.demo.type: rest
      SPARK_CONF_spark.sql.catalog.demo.uri: http://iceberg-rest:8181
      SPARK_CONF_spark.sql.catalog.demo.io-impl: org.apache.iceberg.aws.s3.S3FileIO
      SPARK_CONF_spark.sql.catalog.demo.s3.endpoint: http://minio:9000
      SPARK_CONF_spark.sql.catalog.demo.s3.path-style-access: "true"
      SPARK_CONF_spark.sql.defaultCatalog: demo
      SPARK_CONF_spark.sql.extensions: >-
        org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    volumes:
      - ../tests:/opt/tests
      - ../scripts:/opt/scripts
