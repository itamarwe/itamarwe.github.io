<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Co-array explorer — interactive</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif; color: #ededed; }
    #app { position: fixed; inset: 0; }
    .label { font-size: 12px; color: #9aa4b2; text-shadow: 0 0 4px #000;
      pointer-events: none; user-select: none; }
    #ui { position: fixed; left: 12px; top: 12px; display: flex; flex-direction: column;
      gap: 8px; background: rgba(14,17,22,.72); padding: 12px 14px; border-radius: 10px;
      backdrop-filter: blur(4px); max-width: 270px; }
    .row { display: flex; flex-wrap: wrap; gap: 6px; }
    button { background: #1b2128; color: #cdd6e0; border: 1px solid #2a323c;
      border-radius: 6px; padding: 5px 9px; font-size: 12px; cursor: pointer; }
    button.on { background: #3fc1ff; color: #08121a; border-color: #3fc1ff; font-weight: 600; }
    .ttl { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; }
    #stats { position: fixed; right: 12px; top: 12px; background: rgba(14,17,22,.72);
      padding: 12px 14px; border-radius: 10px; backdrop-filter: blur(4px); font-size: 13px;
      line-height: 1.7; min-width: 180px; }
    #stats b { color: #fff; } #stats .k { color: #6b7280; }
    #hint { position: fixed; left: 12px; bottom: 10px; font-size: 12px; color: #6b7280;
      pointer-events: none; max-width: 60%; }
    label.chk { font-size: 12px; color: #cdd6e0; display: flex; gap: 6px; align-items: center; }
  </style>
  <script type="importmap">
  { "imports": { "three": "./vendor/three.module.js", "three/addons/": "./vendor/addons/" } }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="ui">
    <div><span class="ttl">Geometry</span></div>
    <div class="row" id="geoRow"></div>
    <div><span class="ttl">Aperture</span></div>
    <div class="row" id="apRow"></div>
    <label class="chk"><input type="checkbox" id="showBase" checked /> show 120 pair baselines</label>
    <label class="chk"><input type="checkbox" id="showCo" checked /> show co-array cloud</label>
  </div>
  <div id="stats"></div>
  <div id="hint">Drag to rotate · gold = microphones · cyan cloud = the co-array (every pair's baseline vector). A rich, spread-out cloud = more independent spatial cues for a multichannel network.</div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { CSS2DRenderer, CSS2DObject } from "three/addons/renderers/CSS2DRenderer.js";

    const GOLD = Math.PI*(3-Math.sqrt(5)), M = 16;
    const geos = {
      "ULA": (ap)=>Array.from({length:M},(_,i)=>[(-ap/2)+ap*i/(M-1),0,0]),
      "UCA": (ap)=>Array.from({length:M},(_,i)=>{const a=i*2*Math.PI/M,R=ap/2;return[R*Math.cos(a),R*Math.sin(a),0];}),
      "Spiral": (ap)=>Array.from({length:M},(_,i)=>{const R=ap/2,r=R*Math.sqrt((i+0.5)/M),th=i*GOLD;return[r*Math.cos(th),r*Math.sin(th),0];}),
      "Nested dome": (ap)=>nestedDome(ap),
    };
    function nestedAperiodic(ap){const R=ap/2,rIn=Math.min(0.06,0.18*R),nIn=6,nOut=M-nIn,pts=[];
      for(let m=0;m<nIn;m++){const r=rIn*Math.sqrt((m+0.5)/nIn),th=m*GOLD;pts.push([r*Math.cos(th),r*Math.sin(th),0]);}
      for(let m=0;m<nOut;m++){const r=rIn+(R-rIn)*Math.sqrt((m+0.5)/nOut),th=m*GOLD+1.7;pts.push([r*Math.cos(th),r*Math.sin(th),0]);}
      return pts;}
    function nestedDome(ap){const R=ap/2,p=nestedAperiodic(ap);
      return p.map(([x,y])=>{const rho=Math.hypot(x,y);return[x,y,0.45*R*Math.sqrt(Math.max(0,1-(rho/R)**2))];});}

    const app = document.getElementById("app");
    const scene = new THREE.Scene();
    const view = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    view.position.set(2.8, 2.6, 4.6);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setClearColor(0x000000, 1);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.domElement.style.position="absolute"; labelRenderer.domElement.style.top="0";
    labelRenderer.domElement.style.pointerEvents="none"; app.appendChild(labelRenderer.domElement);
    const controls = new OrbitControls(view, renderer.domElement);
    controls.enableDamping=true; controls.dampingFactor=0.08;
    controls.minDistance=2; controls.maxDistance=18;
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    let group = new THREE.Group(); scene.add(group);
    let state = { geo:"Nested dome", ap:0.40, base:true, co:true };

    function rebuild(){
      scene.remove(group); group = new THREE.Group();
      const pos = geos[state.geo](state.ap);
      let mx=1e-9; for(const[x,y,z]of pos) mx=Math.max(mx,Math.hypot(x,y,z));
      const s = 1.6/mx;                       // mics fit in ~1.6 units
      // microphones (gold)
      for(const[x,y,z]of pos){
        const m=new THREE.Mesh(new THREE.SphereGeometry(0.05,14,14),
          new THREE.MeshBasicMaterial({color:0xffd166}));
        m.position.set(x*s,y*s,z*s); group.add(m); }
      // baselines (faint)
      if(state.base){ const segs=[];
        for(let i=0;i<M;i++)for(let j=i+1;j<M;j++){
          segs.push(pos[i][0]*s,pos[i][1]*s,pos[i][2]*s, pos[j][0]*s,pos[j][1]*s,pos[j][2]*s); }
        const g=new THREE.BufferGeometry(); g.setAttribute("position",new THREE.Float32BufferAttribute(segs,3));
        group.add(new THREE.LineSegments(g,new THREE.LineBasicMaterial(
          {color:0xe06c4b, transparent:true, opacity:0.18}))); }
      // co-array cloud (cyan): all p_i - p_j (both signs), offset below for clarity
      const Ls=[]; if(state.co){ const pts=[]; const off=-0.0;
        for(let i=0;i<M;i++)for(let j=0;j<M;j++){ if(i===j)continue;
          const dx=(pos[i][0]-pos[j][0])*s, dy=(pos[i][1]-pos[j][1])*s, dz=(pos[i][2]-pos[j][2])*s;
          pts.push(dx,dy+off,dz); }
        const g=new THREE.BufferGeometry(); g.setAttribute("position",new THREE.Float32BufferAttribute(pts,3));
        group.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x3fc1ff, size:0.06})));
      }
      for(let i=0;i<M;i++)for(let j=i+1;j<M;j++){
        Ls.push(Math.round(Math.hypot(pos[i][0]-pos[j][0],pos[i][1]-pos[j][1],pos[i][2]-pos[j][2])*1000)); }
      scene.add(group);
      document.getElementById("stats").innerHTML =
        `<div class="k">geometry</div><b>${state.geo}</b> · ${(state.ap*100)|0} cm<br>`+
        `<div class="k">microphone pairs</div><b>120</b><br>`+
        `<div class="k">distinct baselines</div><b>${new Set(Ls).size}</b><br>`+
        `<div class="k">redundancy</div><b>${(120/new Set(Ls).size).toFixed(1)}×</b>`;
    }

    const geoRow=document.getElementById("geoRow");
    Object.keys(geos).forEach(n=>{const b=document.createElement("button");b.textContent=n;
      if(n===state.geo)b.classList.add("on");
      b.onclick=()=>{state.geo=n;[...geoRow.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");rebuild();};
      geoRow.appendChild(b);});
    const apRow=document.getElementById("apRow");
    [["medium 40 cm",0.40],["large 120 cm",1.20]].forEach(([l,ap])=>{const b=document.createElement("button");b.textContent=l;
      if(ap===state.ap)b.classList.add("on");
      b.onclick=()=>{state.ap=ap;[...apRow.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");rebuild();};
      apRow.appendChild(b);});
    document.getElementById("showBase").onchange=e=>{state.base=e.target.checked;rebuild();};
    document.getElementById("showCo").onchange=e=>{state.co=e.target.checked;rebuild();};

    function resize(){const w=app.clientWidth,h=app.clientHeight;renderer.setSize(w,h);
      labelRenderer.setSize(w,h);view.aspect=w/h;view.updateProjectionMatrix();}
    window.addEventListener("resize",resize); resize(); rebuild();
    (function animate(){requestAnimationFrame(animate);controls.update();
      renderer.render(scene,view);labelRenderer.render(scene,view);})();
  </script>
</body>
</html>
