<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The team brain — interactive knowledge graph</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif; color: #ededed; }
    #app { position: fixed; inset: 0; }
    .label { font-size: 12px; color: #cdd6e0; text-shadow: 0 0 5px #000, 0 0 5px #000;
      pointer-events: none; user-select: none; white-space: nowrap; }
    .label.hot { font-weight: 600; color: #fff; font-size: 13px; }
    #ui { position: fixed; left: 12px; top: 12px; display: flex; flex-direction: column;
      gap: 9px; background: rgba(14,17,22,.72); padding: 12px 14px; border-radius: 10px;
      backdrop-filter: blur(4px); max-width: 250px; }
    .ttl { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; }
    button { background: #1b2128; color: #cdd6e0; border: 1px solid #2a323c;
      border-radius: 6px; padding: 7px 11px; font-size: 12px; cursor: pointer; }
    button:hover { border-color: #3fc1ff; }
    button.go { background: #3fc1ff; color: #08121a; border-color: #3fc1ff; font-weight: 600; }
    .legend { display: flex; flex-direction: column; gap: 4px; font-size: 12px; }
    .legend div { display: flex; align-items: center; gap: 7px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
    #stats { position: fixed; right: 12px; top: 12px; background: rgba(14,17,22,.72);
      padding: 11px 14px; border-radius: 10px; backdrop-filter: blur(4px); font-size: 13px;
      line-height: 1.7; min-width: 150px; }
    #stats b { color: #fff; } #stats .k { color: #6b7280; }
    #hint { position: fixed; left: 12px; bottom: 10px; font-size: 12px; color: #6b7280;
      pointer-events: none; max-width: 62%; }
    @media (max-width: 600px) {
      #ui { padding: 8px 10px; gap: 6px; max-width: 50vw; }
      button { padding: 5px 7px; font-size: 11px; }
      .legend { font-size: 11px; }
      #stats { top: auto; bottom: 8px; right: 8px; padding: 7px 10px; font-size: 11px;
        line-height: 1.45; min-width: 0; }
      #hint { display: none; }
    }
  </style>
  <script type="importmap">
  { "imports": { "three": "./vendor/three.module.js", "three/addons/": "./vendor/addons/" } }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="ui">
    <div><span class="ttl">The team brain</span></div>
    <button id="ingest" class="go">▶ Ingest a meeting</button>
    <button id="reset">Reset</button>
    <div><span class="ttl">Node types</span></div>
    <div class="legend">
      <div><span class="dot" style="background:#3fc1ff"></span>concept</div>
      <div><span class="dot" style="background:#ffd166"></span>person</div>
      <div><span class="dot" style="background:#7CFC8A"></span>company</div>
      <div><span class="dot" style="background:#e0a64b"></span>meeting</div>
      <div><span class="dot" style="background:#ff5a5a"></span>decision</div>
    </div>
  </div>
  <div id="stats"></div>
  <div id="hint">Drag to rotate · hover a node to trace its links. Every node is a wiki
    page; the edges are the cross-links between them. Ingest a meeting and watch a single
    conversation update pages all across the graph.</div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { CSS2DRenderer, CSS2DObject } from "three/addons/renderers/CSS2DRenderer.js";

    const COL = {
      concept: 0x3fc1ff, person: 0xffd166, company: 0x7CFC8A,
      meeting: 0xe0a64b, decision: 0xff5a5a, edge: 0x3a4351,
    };

    // ---- the seed graph: a small monday/Harmony-flavoured team brain ----------
    const N = [
      { t:"concept",  n:"Go-to-Market" },
      { t:"concept",  n:"API-First Architecture" },
      { t:"concept",  n:"Pricing" },
      { t:"concept",  n:"AI Note Taker" },
      { t:"concept",  n:"Vision Deck" },
      { t:"concept",  n:"Onboarding" },
      { t:"concept",  n:"Positioning" },
      { t:"person",   n:"PM" },
      { t:"person",   n:"Designer" },
      { t:"person",   n:"GTM Lead" },
      { t:"person",   n:"Engineer" },
      { t:"company",  n:"Competitor A" },
      { t:"company",  n:"Competitor B" },
      { t:"company",  n:"Lighthouse Customer" },
      { t:"meeting",  n:"Discovery call" },
      { t:"meeting",  n:"Architecture sync" },
      { t:"meeting",  n:"Pricing workshop" },
      { t:"decision", n:"Adopt API-first" },
      { t:"decision", n:"Pricing tiers v1" },
      { t:"decision", n:"Ship onboarding first" },
    ];
    const E = [
      [0,2],[0,6],[0,9],[0,13],
      [1,17],[1,15],[1,10],
      [2,16],[2,18],[2,11],[2,12],[2,9],
      [3,14],[3,7],
      [4,0],[4,7],[4,6],
      [5,19],[5,8],[5,7],
      [6,11],[6,12],[6,9],
      [7,16],[8,5],[9,14],[10,15],[10,1],
      [11,13],[12,13],
      [14,0],[14,13],[15,1],[15,10],[16,2],[16,18],
      [17,1],[18,2],[19,5],
    ];

    // meetings that can be "ingested" later — each lights up several existing pages
    const NEW_MEETINGS = [
      { n:"Competitor A demo", links:["Competitor A","Pricing","Positioning","Go-to-Market","GTM Lead"] },
      { n:"Roadmap review",    links:["Onboarding","Vision Deck","PM","Ship onboarding first","Pricing"] },
      { n:"Eng deep-dive",     links:["API-First Architecture","Engineer","Adopt API-first","AI Note Taker"] },
      { n:"Sales call",        links:["Lighthouse Customer","Pricing","Positioning","Competitor B"] },
    ];

    const nodes = [], edges = [];
    function addNode(t, n, seeded=true) {
      const r = seeded ? 9 : 0.4;
      const node = {
        t, n, seeded,
        pos: new THREE.Vector3((Math.random()-.5)*r, (Math.random()-.5)*r, (Math.random()-.5)*r),
        vel: new THREE.Vector3(), glow: 0,
        mesh: null, labelObj: null, deg: 0,
      };
      nodes.push(node);
      return node;
    }
    N.forEach(d => addNode(d.t, d.n));
    E.forEach(([a,b]) => edges.push({ a:nodes[a], b:nodes[b], glow:0 }));

    // ---- scene plumbing -------------------------------------------------------
    const app = document.getElementById("app");
    const scene = new THREE.Scene();
    const view = new THREE.PerspectiveCamera(48, 1, 0.1, 500);
    view.position.set(0, 0, 33);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setClearColor(0x000000, 1);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.domElement.style.position = "absolute";
    labelRenderer.domElement.style.top = "0";
    labelRenderer.domElement.style.pointerEvents = "none";
    app.appendChild(labelRenderer.domElement);
    const controls = new OrbitControls(view, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.08;
    controls.minDistance = 12; controls.maxDistance = 60;
    controls.autoRotate = true; controls.autoRotateSpeed = 0.5;
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    const sphereGeo = new THREE.SphereGeometry(1, 18, 18);
    function buildMesh(node) {
      const base = COL[node.t];
      const mat = new THREE.MeshBasicMaterial({ color: base });
      const m = new THREE.Mesh(sphereGeo, mat);
      m.userData.node = node;
      node.mesh = m; node.baseColor = new THREE.Color(base);
      scene.add(m);
      const el = document.createElement("div");
      el.className = "label";
      el.textContent = node.n;
      const lo = new CSS2DObject(el);
      lo.position.set(0, 1, 0);
      m.add(lo);
      node.labelEl = el; node.labelObj = lo;
    }
    nodes.forEach(buildMesh);

    // edges drawn as one LineSegments buffer, rebuilt when topology changes
    let edgeLines, edgeGeo;
    function rebuildEdges() {
      if (edgeLines) scene.remove(edgeLines);
      edgeGeo = new THREE.BufferGeometry();
      edgeGeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(edges.length*6), 3));
      edgeGeo.setAttribute("color", new THREE.BufferAttribute(new Float32Array(edges.length*6), 3));
      edgeLines = new THREE.LineSegments(edgeGeo,
        new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.55 }));
      scene.add(edgeLines);
      nodes.forEach(n => n.deg = 0);
      edges.forEach(e => { e.a.deg++; e.b.deg++; });
    }
    rebuildEdges();

    // ---- force-directed layout ------------------------------------------------
    function step() {
      const REP = 11, SPRING = 0.013, LEN = 3.8, CENTER = 0.010, DAMP = 0.86;
      for (let i=0;i<nodes.length;i++){
        const a = nodes[i];
        for (let j=i+1;j<nodes.length;j++){
          const b = nodes[j];
          const dx=a.pos.x-b.pos.x, dy=a.pos.y-b.pos.y, dz=a.pos.z-b.pos.z;
          let d2 = dx*dx+dy*dy+dz*dz; if (d2<0.01) d2=0.01;
          const f = REP/d2, inv = 1/Math.sqrt(d2);
          const fx=dx*inv*f, fy=dy*inv*f, fz=dz*inv*f;
          a.vel.x+=fx; a.vel.y+=fy; a.vel.z+=fz;
          b.vel.x-=fx; b.vel.y-=fy; b.vel.z-=fz;
        }
      }
      for (const e of edges){
        const a=e.a, b=e.b;
        const dx=b.pos.x-a.pos.x, dy=b.pos.y-a.pos.y, dz=b.pos.z-a.pos.z;
        const d=Math.sqrt(dx*dx+dy*dy+dz*dz)||0.01;
        const f=SPRING*(d-LEN)/d;
        a.vel.x+=dx*f; a.vel.y+=dy*f; a.vel.z+=dz*f;
        b.vel.x-=dx*f; b.vel.y-=dy*f; b.vel.z-=dz*f;
      }
      for (const n of nodes){
        n.vel.x-=n.pos.x*CENTER; n.vel.y-=n.pos.y*CENTER; n.vel.z-=n.pos.z*CENTER;
        n.vel.multiplyScalar(DAMP);
        n.pos.add(n.vel);
      }
    }
    for (let k=0;k<160;k++) step(); // settle before first frame

    // ---- interaction: hover highlight ----------------------------------------
    const ray = new THREE.Raycaster(); const ptr = new THREE.Vector2();
    let hovered = null;
    function setPointer(e){
      const r = renderer.domElement.getBoundingClientRect();
      ptr.x = ((e.clientX-r.left)/r.width)*2-1;
      ptr.y = -((e.clientY-r.top)/r.height)*2+1;
    }
    renderer.domElement.addEventListener("pointermove", e=>{
      setPointer(e);
      ray.setFromCamera(ptr, view);
      const hit = ray.intersectObjects(nodes.map(n=>n.mesh))[0];
      hovered = hit ? hit.object.userData.node : null;
      controls.autoRotate = !hovered;
    });

    function neighbours(node){
      const s = new Set([node]);
      for (const e of edges){ if (e.a===node) s.add(e.b); if (e.b===node) s.add(e.a); }
      return s;
    }

    // ---- "ingest a meeting" animation ----------------------------------------
    let mi = 0, pulses = [];
    function ingest(){
      const spec = NEW_MEETINGS[mi % NEW_MEETINGS.length]; mi++;
      const m = addNode("meeting", spec.n, false);
      // spawn near the centre, slightly out front
      m.pos.set((Math.random()-.5)*2, (Math.random()-.5)*2, 10);
      buildMesh(m);
      m.glow = 1.4;
      const targets = spec.links
        .map(name => nodes.find(x => x.n === name))
        .filter(Boolean);
      targets.forEach((tg, k) => {
        edges.push({ a:m, b:tg, glow:1.2, fresh:true });
        // a travelling pulse along the new edge
        pulses.push({ from:m, to:tg, u:-k*0.18 });
        tg.glow = Math.max(tg.glow, 1.2);
      });
      rebuildEdges();
      updateStats(targets.length);
    }

    const pulseGeo = new THREE.SphereGeometry(0.28, 10, 10);
    const pulseMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const pulseMesh = new THREE.InstancedMesh(pulseGeo, pulseMat, 64);
    pulseMesh.count = 0; scene.add(pulseMesh);
    const tmp = new THREE.Object3D();

    function updateStats(updated){
      const el = document.getElementById("stats");
      const counts = {};
      nodes.forEach(n => counts[n.t]=(counts[n.t]||0)+1);
      el.innerHTML =
        `<div class="k">pages</div><b>${nodes.length}</b><br>`+
        `<div class="k">cross-links</div><b>${edges.length}</b><br>`+
        (updated!=null ? `<div class="k">last meeting touched</div><b>${updated} pages</b>` :
          `<div class="k">hover</div>a node to trace links`);
    }
    updateStats(null);

    document.getElementById("ingest").onclick = ingest;
    document.getElementById("reset").onclick = ()=>location.reload();

    // ---- render loop ----------------------------------------------------------
    const posAttr = () => edgeGeo.getAttribute("position");
    const colAttr = () => edgeGeo.getAttribute("color");
    const cEdge = new THREE.Color(COL.edge), cHot = new THREE.Color(0xffffff);
    const cFresh = new THREE.Color(0xffe08a);

    function frame(){
      requestAnimationFrame(frame);
      step();

      const hot = hovered ? neighbours(hovered) : null;

      // nodes: scale + glow
      for (const n of nodes){
        const baseR = 0.34 + Math.min(n.deg,8)*0.045;
        const lit = hot ? (hot.has(n) ? 1 : 0) : 1;
        const r = baseR * (1 + n.glow*0.5) * (hot ? (lit?1.15:0.55) : 1);
        n.mesh.position.copy(n.pos);
        n.mesh.scale.setScalar(r);
        const c = n.baseColor.clone();
        if (n.glow>0) c.lerp(cHot, Math.min(n.glow,1)*0.7);
        if (hot && !lit) c.multiplyScalar(0.32);
        n.mesh.material.color.copy(c);
        // labels: show for hovered neighbourhood, glowing nodes, or big hubs
        const show = (hot && lit) || n.glow>0.15 || (!hot && n.deg>=5);
        n.labelEl.style.opacity = show ? "1" : "0";
        n.labelEl.classList.toggle("hot", !!(hot && n===hovered));
        n.glow *= 0.965;
      }

      // edges
      const pa = posAttr(), ca = colAttr();
      edges.forEach((e,i)=>{
        pa.setXYZ(i*2,   e.a.pos.x, e.a.pos.y, e.a.pos.z);
        pa.setXYZ(i*2+1, e.b.pos.x, e.b.pos.y, e.b.pos.z);
        let col = cEdge;
        if (e.glow>0.02){ col = cFresh.clone().lerp(cEdge, 1-Math.min(e.glow,1)); e.glow*=0.97; }
        else if (hot && (hot.has(e.a)&&hot.has(e.b))) col = cHot;
        else if (hot) col = cEdge.clone().multiplyScalar(0.3);
        ca.setXYZ(i*2,   col.r,col.g,col.b);
        ca.setXYZ(i*2+1, col.r,col.g,col.b);
      });
      pa.needsUpdate = true; ca.needsUpdate = true;

      // pulses travelling along freshly ingested edges
      let pc = 0;
      pulses = pulses.filter(p => p.u < 1.05);
      pulses.forEach(p=>{
        p.u += 0.022;
        const u = Math.max(0, Math.min(1, p.u));
        tmp.position.lerpVectors(p.from.pos, p.to.pos, u);
        tmp.scale.setScalar(1);
        tmp.updateMatrix();
        if (pc < 64) pulseMesh.setMatrixAt(pc++, tmp.matrix);
      });
      pulseMesh.count = pc;
      if (pc) pulseMesh.instanceMatrix.needsUpdate = true;

      controls.update();
      renderer.render(scene, view);
      labelRenderer.render(scene, view);
    }

    function resize(){
      const w=app.clientWidth, h=app.clientHeight;
      renderer.setSize(w,h); labelRenderer.setSize(w,h);
      view.aspect=w/h; view.updateProjectionMatrix();
    }
    window.addEventListener("resize", resize); resize(); frame();
  </script>
</body>
</html>
