<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG vs. the living wiki — interactive</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif; color: #ededed; }
    #app { position: fixed; inset: 0; }
    .label { font-size: 12px; color: #cdd6e0; text-shadow: 0 0 5px #000, 0 0 5px #000;
      pointer-events: none; user-select: none; white-space: nowrap; }
    .label.big { font-size: 13px; font-weight: 600; color: #fff; }
    #ui { position: fixed; left: 12px; top: 12px; display: flex; flex-direction: column;
      gap: 9px; background: rgba(14,17,22,.72); padding: 12px 14px; border-radius: 10px;
      backdrop-filter: blur(4px); max-width: 250px; }
    .ttl { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; }
    .row { display: flex; gap: 6px; }
    button { background: #1b2128; color: #cdd6e0; border: 1px solid #2a323c;
      border-radius: 6px; padding: 7px 11px; font-size: 12px; cursor: pointer; }
    button:hover { border-color: #3fc1ff; }
    button.on { background: #3fc1ff; color: #08121a; border-color: #3fc1ff; font-weight: 600; }
    button.ask { background: #7CFC8A; color: #06210c; border-color: #7CFC8A; font-weight: 600; }
    button:disabled { opacity: .5; cursor: default; }
    #stats { position: fixed; right: 12px; top: 12px; background: rgba(14,17,22,.72);
      padding: 11px 14px; border-radius: 10px; backdrop-filter: blur(4px); font-size: 13px;
      line-height: 1.65; min-width: 190px; max-width: 250px; }
    #stats b { color: #fff; } #stats .k { color: #6b7280; }
    #hint { position: fixed; left: 12px; bottom: 10px; font-size: 12px; color: #6b7280;
      pointer-events: none; max-width: 62%; }
    @media (max-width: 600px) {
      #ui { padding: 8px 10px; gap: 6px; max-width: 48vw; }
      button { padding: 5px 7px; font-size: 11px; }
      #stats { top: auto; bottom: 8px; right: 8px; padding: 7px 10px; font-size: 11px;
        line-height: 1.4; min-width: 0; max-width: 48vw; }
      #hint { display: none; }
    }
  </style>
  <script type="importmap">
  { "imports": { "three": "./vendor/three.module.js", "three/addons/": "./vendor/addons/" } }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="ui">
    <div><span class="ttl">Memory model</span></div>
    <div class="row" id="modeRow"></div>
    <button id="ask" class="ask">▶ Ask the same question</button>
    <button id="reset">Reset</button>
  </div>
  <div id="stats"></div>
  <div id="hint">Same question, asked again and again. <b>RAG</b> re-scans the whole corpus
    every single time and keeps nothing. The <b>living wiki</b> answers from a page it wrote
    once, and the second ask onward is just a lookup.</div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { CSS2DRenderer, CSS2DObject } from "three/addons/renderers/CSS2DRenderer.js";

    const CYAN=0x3fc1ff, GREEN=0x7CFC8A, GOLD=0xffd166, GREY=0x46505e, WHITE=0xffffff;

    const app = document.getElementById("app");
    const scene = new THREE.Scene();
    const view = new THREE.PerspectiveCamera(46, 1, 0.1, 200);
    view.position.set(0, 1.5, 16);
    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setClearColor(0x000000,1);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    app.appendChild(renderer.domElement);
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.domElement.style.position="absolute"; labelRenderer.domElement.style.top="0";
    labelRenderer.domElement.style.pointerEvents="none"; app.appendChild(labelRenderer.domElement);
    const controls = new OrbitControls(view, renderer.domElement);
    controls.enableDamping=true; controls.dampingFactor=0.08;
    controls.minDistance=9; controls.maxDistance=34; controls.target.set(0,0.5,0);
    scene.add(new THREE.AmbientLight(0xffffff,1.0));

    function mkLabel(text, x,y,z, big){
      const el=document.createElement("div"); el.className="label"+(big?" big":""); el.textContent=text;
      const o=new CSS2DObject(el); o.position.set(x,y,z); scene.add(o); return {el,o};
    }

    // query node on the left
    const qMat = new THREE.MeshBasicMaterial({color:GOLD});
    const query = new THREE.Mesh(new THREE.SphereGeometry(0.45,18,18), qMat);
    query.position.set(-7.5,0,0); scene.add(query);
    mkLabel("your question", -7.5, 1.2, 0, true);

    // a travelling pulse
    const pulse = new THREE.Mesh(new THREE.SphereGeometry(0.26,12,12),
      new THREE.MeshBasicMaterial({color:WHITE}));
    pulse.visible=false; scene.add(pulse);

    let store = new THREE.Group(); scene.add(store);
    let items = [];           // {mesh, base, lit, home}
    let links = null;         // wiki cross-links
    let mode = "RAG";
    let savedPage = -1;       // index of the persisted answer page (wiki)
    let searches = 0;         // RAG re-scans
    let storeLabel = null;

    function clearStore(){
      scene.remove(store); store = new THREE.Group(); scene.add(store);
      items = []; links = null; savedPage = -1;
      if (storeLabel) { scene.remove(storeLabel.o); }
    }

    function buildRAG(){
      clearStore();
      // a diffuse, unstructured cloud of chunk vectors
      const M=150;
      for(let i=0;i<M;i++){
        const x=5+(Math.random()-.5)*5.5, y=(Math.random()-.5)*7, z=(Math.random()-.5)*5.5;
        const m=new THREE.Mesh(new THREE.SphereGeometry(0.11,8,8),
          new THREE.MeshBasicMaterial({color:GREY}));
        m.position.set(x,y,z); store.add(m);
        items.push({mesh:m, base:new THREE.Color(GREY), lit:0});
      }
      storeLabel = mkLabel("corpus — 150 raw chunks (re-scanned every query)", 5, 4.3, 0, false);
    }

    function buildWiki(){
      clearStore();
      // a tidy, structured set of synthesised pages on a sphere, cross-linked
      const M=18, R=3.0, cx=5;
      const pts=[];
      for(let i=0;i<M;i++){
        const ph=Math.acos(1-2*(i+0.5)/M), th=Math.PI*(1+Math.sqrt(5))*i;
        const x=cx+R*Math.sin(ph)*Math.cos(th), y=R*Math.cos(ph)*0.9, z=R*Math.sin(ph)*Math.sin(th);
        pts.push(new THREE.Vector3(x,y,z));
        const m=new THREE.Mesh(new THREE.BoxGeometry(0.34,0.42,0.06),
          new THREE.MeshBasicMaterial({color:CYAN}));
        m.position.set(x,y,z); m.lookAt(view.position); store.add(m);
        items.push({mesh:m, base:new THREE.Color(CYAN), lit:0, persist:0});
      }
      // cross-links between nearby pages
      const segs=[];
      for(let i=0;i<M;i++) for(let j=i+1;j<M;j++){
        if (pts[i].distanceTo(pts[j])<2.6){ const a=pts[i],b=pts[j]; segs.push(a.x,a.y,a.z,b.x,b.y,b.z); }
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute("position", new THREE.Float32BufferAttribute(segs,3));
      links=new THREE.LineSegments(g, new THREE.LineBasicMaterial({color:0x2f6b86, transparent:true, opacity:.6}));
      store.add(links);
      storeLabel = mkLabel("wiki — synthesised pages, cross-linked & persistent", 5, 4.3, 0, false);
    }

    function setMode(m){
      mode=m; searches=0;
      [...modeRow.children].forEach(b=>b.classList.toggle("on", b.textContent.startsWith(m)));
      if (m==="RAG") buildRAG(); else buildWiki();
      stopAnim(); updateStats();
    }

    // ---- ask animation --------------------------------------------------------
    let anim=null;
    function stopAnim(){ anim=null; pulse.visible=false; }

    function pickHits(){
      if (mode==="RAG"){
        // RAG: a different scattered handful "retrieved" each time, from scratch
        const idx=new Set(); while(idx.size<7) idx.add((Math.random()*items.length)|0);
        return [...idx];
      } else {
        // wiki: the same 3 source pages every time (the question is fixed)
        return [2,7,12];
      }
    }

    function ask(){
      if (anim) return;
      const hits=pickHits();
      const cached = (mode==="WIKI" && savedPage>=0);
      anim={ t0:performance.now(), hits, phase:0, cached };
      searches++;
      askBtn.disabled=true;
    }

    function centroid(hits){
      const c=new THREE.Vector3();
      hits.forEach(i=>c.add(items[i].mesh.position));
      return c.multiplyScalar(1/hits.length);
    }

    function updateStats(extra){
      const el=document.getElementById("stats");
      if (mode==="RAG"){
        el.innerHTML =
          `<div class="k">model</div><b style="color:#9aa4b2">RAG</b><br>`+
          `<div class="k">times asked</div><b>${searches}</b><br>`+
          `<div class="k">full re-scans</div><b style="color:#ff5a5a">${searches}</b><br>`+
          `<div class="k">knowledge kept</div><b>none</b><br>`+
          `<div class="k">work / repeat ask</div><b>same every time</b>`;
      } else {
        const built = savedPage>=0;
        el.innerHTML =
          `<div class="k">model</div><b style="color:#7CFC8A">Living wiki</b><br>`+
          `<div class="k">times asked</div><b>${searches}</b><br>`+
          `<div class="k">pages written</div><b>${built?1:0}</b><br>`+
          `<div class="k">answer source</div><b>${built && searches>1 ? "saved page (cached)" : "synthesised once"}</b><br>`+
          `<div class="k">work / repeat ask</div><b style="color:#7CFC8A">${built && searches>1 ? "just a lookup" : "compile once"}</b>`;
      }
    }

    // ---- UI -------------------------------------------------------------------
    const modeRow=document.getElementById("modeRow");
    [["RAG","RAG"],["WIKI","Living wiki"]].forEach(([k,lab])=>{
      const b=document.createElement("button"); b.textContent=lab; b.dataset.k=k;
      b.onclick=()=>setMode(k); modeRow.appendChild(b);
    });
    const askBtn=document.getElementById("ask"); askBtn.onclick=ask;
    document.getElementById("reset").onclick=()=>setMode(mode);

    // ---- render ---------------------------------------------------------------
    function frame(){
      requestAnimationFrame(frame);
      const cHot=new THREE.Color(WHITE);

      // animation timeline
      if (anim){
        const t=(performance.now()-anim.t0)/1000;
        const c=centroid(anim.hits);
        const OUT=0.85, DWELL=0.6, BACK=0.85;
        if (t<OUT){                                   // query -> store
          pulse.visible=true;
          pulse.position.lerpVectors(query.position, c, t/OUT);
        } else if (t<OUT+DWELL){                       // light up hits
          pulse.visible=false;
          anim.hits.forEach(i=>{ items[i].lit=1; });
        } else if (t<OUT+DWELL+BACK){                  // store -> answer
          pulse.visible=true;
          const u=(t-OUT-DWELL)/BACK;
          pulse.position.lerpVectors(c, query.position, u);
        } else {
          // settle
          if (mode==="WIKI" && savedPage<0){
            savedPage = anim.hits[0];                  // crystallise a saved page
            items[savedPage].persist=1;
          }
          stopAnim(); askBtn.disabled=false; updateStats();
        }
      }

      // item brightness envelopes
      for (const it of items){
        let target = it.lit;
        const c = it.base.clone();
        if (mode==="WIKI" && it.persist) c.lerp(new THREE.Color(GREEN), 0.55);
        if (target>0){ c.lerp(cHot, 0.85*target); }
        it.mesh.material.color.copy(c);
        const s = 1 + target*0.9 + (it.persist?0.25:0);
        it.mesh.scale.setScalar(s);
        // RAG forgets everything; wiki keeps persisted pages lit
        if (mode==="RAG") it.lit *= 0.94;
        else it.lit = it.persist ? Math.max(it.lit*0.94, 0) : it.lit*0.9;
      }
      query.material.color.copy(new THREE.Color(GOLD));

      controls.update();
      renderer.render(scene,view);
      labelRenderer.render(scene,view);
    }

    function resize(){const w=app.clientWidth,h=app.clientHeight;renderer.setSize(w,h);
      labelRenderer.setSize(w,h);view.aspect=w/h;view.updateProjectionMatrix();}
    window.addEventListener("resize",resize); resize();
    setMode("RAG"); frame();
  </script>
</body>
</html>
